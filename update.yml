name: 도시계획 뉴스 자동수집

on:
  workflow_dispatch:
  push:
    branches: ["main"]
  schedule:
    - cron: "0 8 * * *"
      timezone: "Asia/Seoul"
    - cron: "0 10 * * *"
      timezone: "Asia/Seoul"
    - cron: "0 18 * * *"
      timezone: "Asia/Seoul"

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: urban-planning-news
  cancel-in-progress: false

jobs:
  collect:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: 저장소 불러오기
        uses: actions/checkout@v7

      - name: 파이썬 설치
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: 필요한 프로그램 설치
        run: python -m pip install --quiet -r requirements.txt

      - name: 뉴스와 정책자료 수집
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GEMINI_MODEL: gemini-2.5-flash
          RUN_AI_ANALYSIS: ${{ github.event_name == 'workflow_dispatch' || github.event.schedule == '0 10 * * *' || github.event.schedule == '0 18 * * *' }}
        run: python scripts/collect.py

      - name: 수집 결과 저장
        run: |
          git config user.name "urban-planning-news-bot"
          git config user.email "urban-planning-news-bot@users.noreply.github.com"
          git add data/
          if git diff --cached --quiet; then
            echo "새로운 변경사항이 없습니다."
          else
            git commit -m "자동수집: $(TZ=Asia/Seoul date +'%Y-%m-%d %H:%M')"
            git push
          fi

      - name: 홈페이지 파일 준비
        run: |
          mkdir -p _site/data
          cp index.html _site/
          touch _site/.nojekyll
          cp data/latest.json _site/data/
          cp data/keywords.json _site/data/
          cp data/issues.json _site/data/

      - name: GitHub Pages 설정
        uses: actions/configure-pages@v6.0.0
        with:
          enablement: true

      - name: 홈페이지 업로드
        uses: actions/upload-pages-artifact@v5
        with:
          path: _site

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: collect

    steps:
      - name: 홈페이지 배포
        id: deployment
        uses: actions/deploy-pages@v5
