name: 도시계획일보 자동수집 V5

on:
  workflow_dispatch:
  schedule:
    - cron: "17 6 * * *"
      timezone: "Asia/Seoul"

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: urbanplanningdaily-pages
  cancel-in-progress: false

jobs:
  collect-and-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 12

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: 저장소 불러오기
        uses: actions/checkout@v7

      - name: 파이썬 설치
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: 수집기 실행
        shell: bash
        run: |
          python -m pip install --quiet requests feedparser python-dateutil
          cat > /tmp/urbanplanningdaily_v5.py <<'PY'
          from __future__ import annotations

          import hashlib
          import json
          import re
          import sys
          import time
          from collections import Counter
          from concurrent.futures import ThreadPoolExecutor, as_completed
          from datetime import date, datetime, timedelta, timezone
          from pathlib import Path
          from typing import Any
          from urllib.parse import quote

          import feedparser
          import requests
          from dateutil import parser as dateparser
          from requests.adapters import HTTPAdapter
          from urllib3.util.retry import Retry

          ROOT = Path.cwd()
          DATA = ROOT / "data"
          DATA.mkdir(parents=True, exist_ok=True)

          ARCHIVE_PATH = DATA / "archive.json"
          LATEST_PATH = DATA / "latest.json"
          KEYWORDS_PATH = DATA / "keywords.json"
          ISSUES_PATH = DATA / "issues.json"
          STATE_PATH = DATA / "backfill_v5_state.json"

          KST = timezone(timedelta(hours=9))
          NOW = datetime.now(KST)
          TODAY = NOW.date()
          YEAR_START = TODAY - timedelta(days=364)
          KEEP_START = TODAY - timedelta(days=400)

          HEADERS = {
              "User-Agent": (
                  "Mozilla/5.0 (Windows NT 10.0; Win64; x64) "
                  "AppleWebKit/537.36 Chrome/149 Safari/537.36"
              )
          }

          OFFICIAL_FEEDS = [
              {
                  "name": "국토교통부",
                  "category": "정책",
                  "urls": [
                      "https://www.molit.go.kr/dev/board/board_rss.jsp?rss_id=NEWS",
                      "https://molit.go.kr/dev/board/board_rss.jsp?rss_id=NEWS",
                  ],
                  "fallback": (
                      "site:molit.go.kr/USR/NEWS/m_71 "
                      "(도시 OR 국토 OR 주택 OR 건축 OR 교통 OR 철도 OR 지역)"
                  ),
              },
              {
                  "name": "서울특별시",
                  "category": "정책",
                  "urls": [
                      "https://seoulboard.seoul.go.kr/rss/RSSGenerator?bbsNo=158",
                  ],
                  "fallback": (
                      "site:seoul.go.kr/news/news_report.do "
                      "(도시 OR 주택 OR 건축 OR 교통 OR 환경 OR 안전 OR 상권)"
                  ),
              },
              {
                  "name": "경기도",
                  "category": "정책",
                  "urls": [
                      "https://gnews.gg.go.kr/rss/gnewsRssBodo.do",
                  ],
                  "fallback": (
                      "site:gnews.gg.go.kr/briefing "
                      "(도시 OR 주택 OR 건축 OR 교통 OR 환경 OR 산업단지 OR 지역)"
                  ),
              },
          ]

          CURRENT_SEARCHES = [
              (
                  "기사",
                  "(도시계획 OR 국토계획 OR 지구단위계획 OR 용도지역 "
                  "OR 도시개발 OR 도시재생 OR 재개발 OR 재건축 "
                  "OR 지역소멸 OR 균형발전 OR 공공주택 OR 철도지하화 "
                  "OR 스마트시티) when:14d",
              ),
              (
                  "법령",
                  "(site:opinion.lawmaking.go.kr OR site:law.go.kr) "
                  "(도시 OR 국토 OR 주택 OR 건축 OR 교통) when:30d",
              ),
              (
                  "연구",
                  "(site:krihs.re.kr OR site:si.re.kr OR site:auri.re.kr) "
                  "(도시 OR 국토 OR 주택 OR 건축 OR 지역 OR 교통) when:30d",
              ),
          ]

          BACKFILL_SEARCHES = [
              (
                  "정책",
                  "site:molit.go.kr/USR/NEWS/m_71 "
                  "(도시 OR 국토 OR 주택 OR 건축 OR 교통 OR 철도 OR 지역)",
              ),
              (
                  "정책",
                  "site:seoul.go.kr/news/news_report.do "
                  "(도시 OR 주택 OR 건축 OR 교통 OR 환경 OR 안전 OR 상권)",
              ),
              (
                  "정책",
                  "site:gnews.gg.go.kr/briefing "
                  "(도시 OR 주택 OR 건축 OR 교통 OR 환경 OR 산업단지 OR 지역)",
              ),
              (
                  "기사",
                  "(도시계획 OR 국토계획 OR 도시재생 OR 재개발 OR 재건축 "
                  "OR 지역소멸 OR 균형발전 OR 공공주택 OR 철도지하화 "
                  "OR 스마트시티)",
              ),
              (
                  "법령",
                  "(site:opinion.lawmaking.go.kr OR site:law.go.kr) "
                  "(도시 OR 국토 OR 주택 OR 건축 OR 교통)",
              ),
              (
                  "연구",
                  "(site:krihs.re.kr OR site:si.re.kr OR site:auri.re.kr) "
                  "(도시 OR 국토 OR 주택 OR 건축 OR 지역 OR 교통)",
              ),
          ]

          RELEVANT_WORDS = (
              "도시", "국토", "주택", "건축", "부동산", "토지", "교통",
              "철도", "도로", "지역", "재생", "정비", "개발", "계획",
              "공간", "생활권", "상권", "빈집", "인구", "소멸", "균형발전",
              "스마트시티", "스마트도시", "산업단지", "공공주택", "재개발",
              "재건축", "경관", "농촌", "기반시설", "광역", "역세권",
              "기후", "탄소중립", "녹색건축", "용도지역", "지구단위",
              "공공건축", "도심", "택지", "국가산단", "상업지역", "GTX",
              "생활인구", "도심융합", "노후계획도시", "철도지하화",
              "산업전환", "도시혁신", "주거복지", "공실", "침수", "폭염",
          )

          STOPWORDS = {
              "연구", "방안", "위한", "관련", "대한", "통한", "기반",
              "추진", "발표", "개최", "결과", "입법예고", "보도자료",
              "보고서", "서울시", "경기도", "국토교통부", "국토연구원",
              "서울연구원", "건축공간연구원", "정책", "계획", "마련",
              "강화", "지원", "개선", "확대", "제도", "사업", "대응",
              "활성화", "종합", "새로운", "최근", "전국", "정부",
              "분석", "방향", "현황", "통해", "관한", "기자", "뉴스",
              "지역", "도시", "국토", "올해", "내년", "한국", "대상",
          }

          TOPICS = {
              "주택공급·공공주택": (
                  "주택공급", "공공주택", "택지", "임대주택", "주거복지", "분양"
              ),
              "재건축·재개발·정비사업": (
                  "재건축", "재개발", "정비사업", "노후계획도시", "1기 신도시"
              ),
              "지역소멸·균형발전": (
                  "지역소멸", "지방소멸", "균형발전", "생활인구", "인구감소"
              ),
              "철도·광역교통·역세권": (
                  "철도", "GTX", "광역교통", "역세권", "철도지하화", "도시철도"
              ),
              "도시재생·빈집·원도심": (
                  "도시재생", "빈집", "원도심", "구도심", "유휴공간", "공실"
              ),
              "국토계획·용도지역·규제": (
                  "국토계획", "도시계획", "용도지역", "지구단위계획",
                  "개발제한구역", "그린벨트", "용적률"
              ),
              "산업단지·지역산업 전환": (
                  "산업단지", "국가산단", "산업전환", "기업도시", "첨단산업"
              ),
              "스마트시티·AI·디지털전환": (
                  "스마트시티", "스마트도시", "인공지능", "디지털트윈",
                  "자율주행", "도시데이터"
              ),
              "기후위기·탄소중립·녹색건축": (
                  "기후위기", "탄소중립", "녹색건축", "제로에너지",
                  "침수", "폭염", "기후적응"
              ),
              "상권·골목경제·생활권": (
                  "상권", "골목상권", "생활권", "전통시장", "공실",
                  "젠트리피케이션"
              ),
              "농촌공간·농촌재생": (
                  "농촌공간", "농촌재생", "농촌마을", "농촌소멸", "농촌협약"
              ),
              "건축정책·공공건축": (
                  "건축정책", "공공건축", "건축물관리", "노후건축물",
                  "건축안전"
              ),
              "토지·부동산시장": (
                  "부동산", "토지거래", "집값", "지가", "공시가격",
                  "전세", "매매가격"
              ),
              "관광·지역개발": (
                  "관광단지", "지역개발", "관광개발", "문화도시",
                  "복합개발", "워케이션"
              ),
              "도시안전·재난 대응": (
                  "도시안전", "재난", "지진", "산사태", "침수",
                  "화재", "안전진단", "붕괴"
              ),
          }

          TOKEN_RE = re.compile(r"[가-힣]{2,}|[A-Za-z]{2,}")

          def session() -> requests.Session:
              s = requests.Session()
              retry = Retry(
                  total=3,
                  connect=3,
                  read=3,
                  backoff_factor=1.0,
                  status_forcelist=(429, 500, 502, 503, 504),
                  allowed_methods=("GET",),
              )
              s.mount("https://", HTTPAdapter(max_retries=retry))
              s.mount("http://", HTTPAdapter(max_retries=retry))
              s.headers.update(HEADERS)
              return s

          HTTP = session()

          def clean(value: Any) -> str:
              return re.sub(r"\s+", " ", str(value or "")).strip()

          def load_json(path: Path, default: Any) -> Any:
              if not path.exists():
                  return default
              try:
                  return json.loads(path.read_text(encoding="utf-8"))
              except Exception:
                  return default

          def parse_date(value: Any) -> date | None:
              if not value:
                  return None
              try:
                  dt = dateparser.parse(str(value))
                  return dt.date() if dt else None
              except Exception:
                  return None

          def entry_date(entry: Any) -> date | None:
              for key in ("published", "updated", "dc_date"):
                  parsed = parse_date(entry.get(key))
                  if parsed:
                      return parsed
              for key in ("published_parsed", "updated_parsed"):
                  value = entry.get(key)
                  if value:
                      try:
                          return date(value.tm_year, value.tm_mon, value.tm_mday)
                      except Exception:
                          pass
              return None

          def title_key(title: str) -> str:
              value = clean(title).lower()
              value = re.sub(r"\s*[-–—]\s*[^-–—]{2,40}$", "", value)
              return re.sub(r"[^0-9a-z가-힣]+", "", value)

          def is_relevant(title: str) -> bool:
              lower = title.lower()
              return any(word.lower() in lower for word in RELEVANT_WORDS)

          def make_item(
              title: str,
              url: str,
              source: str,
              category: str,
              published: date | None,
          ) -> dict[str, str] | None:
              title = clean(title)
              url = clean(url)
              if len(title) < 5 or not url or not published:
                  return None
              if published < KEEP_START or published > TODAY + timedelta(days=1):
                  return None
              key = f"{published.isoformat()}|{title_key(title)}"
              return {
                  "id": hashlib.sha1(key.encode("utf-8")).hexdigest()[:16],
                  "title": title,
                  "url": url,
                  "source": source,
                  "category": category,
                  "date": published.isoformat(),
              }

          def parse_feed_bytes(
              content: bytes,
              source: str,
              category: str,
              filter_relevant: bool = True,
          ) -> list[dict[str, str]]:
              parsed = feedparser.parse(content)
              rows: list[dict[str, str]] = []
              for entry in parsed.entries[:200]:
                  title = clean(entry.get("title"))
                  if filter_relevant and not is_relevant(title):
                      continue
                  row = make_item(
                      title=title,
                      url=entry.get("link", ""),
                      source=source,
                      category=category,
                      published=entry_date(entry),
                  )
                  if row:
                      rows.append(row)
              return rows

          def fetch_official_feed(spec: dict[str, Any]) -> tuple[list[dict[str, str]], str]:
              errors: list[str] = []
              for url in spec["urls"]:
                  try:
                      response = HTTP.get(
                          url,
                          timeout=(12, 35),
                          allow_redirects=True,
                      )
                      response.raise_for_status()
                      rows = parse_feed_bytes(
                          response.content,
                          source=spec["name"],
                          category=spec["category"],
                          filter_relevant=True,
                      )
                      if rows:
                          return rows, f"RSS {len(rows)}건"
                      errors.append(f"{url}: 0건")
                  except Exception as exc:
                      errors.append(f"{url}: {type(exc).__name__}")
              return [], " / ".join(errors)

          def google_news(
              query: str,
              category: str,
              source_hint: str | None = None,
          ) -> list[dict[str, str]]:
              url = (
                  "https://news.google.com/rss/search?q="
                  + quote(query)
                  + "&hl=ko&gl=KR&ceid=KR:ko"
              )
              response = HTTP.get(url, timeout=(12, 35))
              response.raise_for_status()
              parsed = feedparser.parse(response.content)
              rows: list[dict[str, str]] = []

              for entry in parsed.entries[:100]:
                  title = clean(entry.get("title"))
                  published = entry_date(entry)
                  source_data = entry.get("source") or {}
                  source = (
                      clean(source_data.get("title"))
                      if isinstance(source_data, dict)
                      else ""
                  )
                  source = source_hint or source or "Google 뉴스"

                  row = make_item(
                      title=title,
                      url=entry.get("link", ""),
                      source=source,
                      category=category,
                      published=published,
                  )
                  if row:
                      rows.append(row)
              return rows

          def collect_current() -> tuple[list[dict[str, str]], dict[str, str]]:
              rows: list[dict[str, str]] = []
              status: dict[str, str] = {}

              for spec in OFFICIAL_FEEDS:
                  official_rows, message = fetch_official_feed(spec)
                  if official_rows:
                      rows.extend(official_rows)
                      status[spec["name"]] = message
                      continue

                  try:
                      fallback_query = spec["fallback"] + " when:14d"
                      fallback_rows = google_news(
                          fallback_query,
                          category="정책",
                          source_hint=spec["name"],
                      )
                      fallback_rows = [
                          row for row in fallback_rows
                          if is_relevant(row["title"])
                      ]
                      rows.extend(fallback_rows)
                      status[spec["name"]] = (
                          f"공식 RSS 연결 실패, 공식 누리집 검색 {len(fallback_rows)}건"
                      )
                  except Exception as exc:
                      status[spec["name"]] = (
                          f"수집 실패: {message}; {type(exc).__name__}"
                      )

              for category, query in CURRENT_SEARCHES:
                  try:
                      rows.extend(google_news(query, category))
                  except Exception as exc:
                      status[f"추가 {category}"] = f"실패: {type(exc).__name__}"

              return rows, status

          def month_windows() -> list[tuple[date, date]]:
              windows: list[tuple[date, date]] = []
              end = TODAY + timedelta(days=1)
              for _ in range(12):
                  start = max(YEAR_START, end - timedelta(days=31))
                  windows.append((start, end))
                  end = start
                  if end <= YEAR_START:
                      break
              return windows

          def one_backfill_job(
              category: str,
              base_query: str,
              start: date,
              end: date,
          ) -> list[dict[str, str]]:
              query = (
                  f"{base_query} after:{start.isoformat()} "
                  f"before:{end.isoformat()}"
              )
              return google_news(query, category)

          def collect_backfill() -> tuple[list[dict[str, str]], list[str]]:
              jobs = [
                  (category, query, start, end)
                  for start, end in month_windows()
                  for category, query in BACKFILL_SEARCHES
              ]
              rows: list[dict[str, str]] = []
              errors: list[str] = []

              with ThreadPoolExecutor(max_workers=6) as executor:
                  futures = {
                      executor.submit(one_backfill_job, *job): job
                      for job in jobs
                  }
                  for future in as_completed(futures):
                      category, _, start, end = futures[future]
                      try:
                          found = future.result()
                          rows.extend(found)
                          print(
                              f"[역수집] {category} {start}~{end}: {len(found)}건"
                          )
                      except Exception as exc:
                          errors.append(
                              f"{category} {start}~{end}: {type(exc).__name__}"
                          )
              return rows, errors

          def deduplicate(rows: list[dict[str, str]]) -> list[dict[str, str]]:
              result: dict[str, dict[str, str]] = {}
              for row in rows:
                  key = f"{row.get('date','')}|{title_key(row.get('title',''))}"
                  old = result.get(key)
                  if old is None:
                      result[key] = row
                      continue

                  # 공식 기관 표시가 붙은 항목을 우선합니다.
                  official_names = {"국토교통부", "서울특별시", "경기도"}
                  if (
                      row.get("source") in official_names
                      and old.get("source") not in official_names
                  ):
                      result[key] = row
              return list(result.values())

          def row_date(row: dict[str, str]) -> date | None:
              try:
                  return date.fromisoformat(row["date"])
              except Exception:
                  return None

          def period_rows(
              rows: list[dict[str, str]],
              days: int,
          ) -> list[dict[str, str]]:
              cutoff = TODAY - timedelta(days=days - 1)
              return [
                  row for row in rows
                  if row_date(row) and row_date(row) >= cutoff
              ]

          def counts(rows: list[dict[str, str]], days: int) -> dict[str, int]:
              return dict(
                  Counter(row["category"] for row in period_rows(rows, days))
              )

          def tokens(title: str) -> list[str]:
              result: list[str] = []
              for token in TOKEN_RE.findall(title):
                  token = token.lower()
                  if (
                      len(token) >= 2
                      and token not in STOPWORDS
                      and not token.isdigit()
                  ):
                      result.append(token)
              return result

          def keyword_rows(
              rows: list[dict[str, str]],
              days: int,
          ) -> list[dict[str, Any]]:
              counter: Counter[str] = Counter()
              for row in period_rows(rows, days):
                  counter.update(tokens(row["title"]))
              return [
                  {"word": word, "count": count}
                  for word, count in counter.most_common(20)
              ]

          def match_count(title: str, words: tuple[str, ...]) -> int:
              lower = title.lower()
              return sum(1 for word in words if word.lower() in lower)

          def issue_rows(
              rows: list[dict[str, str]],
              days: int,
          ) -> list[dict[str, Any]]:
              current_start = TODAY - timedelta(days=days - 1)
              previous_start = current_start - timedelta(days=days)
              current = [
                  row for row in rows
                  if row_date(row) and row_date(row) >= current_start
              ]
              previous = [
                  row for row in rows
                  if row_date(row)
                  and previous_start <= row_date(row) < current_start
              ]

              output: list[dict[str, Any]] = []
              for topic, words in TOPICS.items():
                  matched = [
                      row for row in current
                      if match_count(row["title"], words) > 0
                  ]
                  if not matched:
                      continue

                  matched.sort(
                      key=lambda row: (
                          match_count(row["title"], words),
                          row["date"],
                      ),
                      reverse=True,
                  )
                  previous_count = sum(
                      1 for row in previous
                      if match_count(row["title"], words) > 0
                  )
                  difference = len(matched) - previous_count

                  if days == 365:
                      trend = "최근 1년 누적"
                  elif difference > 0:
                      trend = f"직전 동일기간보다 {difference}건 증가"
                  elif difference < 0:
                      trend = f"직전 동일기간보다 {abs(difference)}건 감소"
                  else:
                      trend = "직전 동일기간과 동일"

                  examples: list[str] = []
                  seen: set[str] = set()
                  for row in matched:
                      key = title_key(row["title"])
                      if key in seen:
                          continue
                      seen.add(key)
                      examples.append(row["title"])
                      if len(examples) == 3:
                          break

                  output.append(
                      {
                          "topic": topic,
                          "count": len(matched),
                          "trend_label": trend,
                          "examples": examples,
                      }
                  )

              output.sort(key=lambda row: row["count"], reverse=True)
              return output[:10]

          def coverage(rows: list[dict[str, str]]) -> dict[str, Any]:
              yearly = period_rows(rows, 365)
              dates = [
                  row_date(row) for row in yearly if row_date(row)
              ]
              if not dates:
                  return {
                      "items": 0,
                      "oldest": None,
                      "newest": None,
                      "days_covered": 0,
                      "complete": False,
                  }

              oldest = min(dates)
              newest = max(dates)
              days_covered = (newest - oldest).days + 1
              return {
                  "items": len(yearly),
                  "oldest": oldest.isoformat(),
                  "newest": newest.isoformat(),
                  "days_covered": days_covered,
                  "complete": (
                      len(yearly) >= 180
                      and oldest <= TODAY - timedelta(days=330)
                  ),
              }

          def main() -> None:
              old_archive = load_json(ARCHIVE_PATH, [])
              if not isinstance(old_archive, list):
                  old_archive = []

              current, source_status = collect_current()
              combined = old_archive + current

              old_coverage = coverage(old_archive)
              state = load_json(STATE_PATH, {})
              need_backfill = (
                  not state.get("complete")
                  or not old_coverage.get("complete")
              )

              backfill_errors: list[str] = []
              if need_backfill:
                  historical, backfill_errors = collect_backfill()
                  combined.extend(historical)

              archive = deduplicate(combined)
              archive = [
                  row for row in archive
                  if row_date(row)
                  and KEEP_START <= row_date(row) <= TODAY + timedelta(days=1)
              ]
              archive.sort(
                  key=lambda row: (
                      row.get("date", ""),
                      row.get("source", ""),
                  ),
                  reverse=True,
              )

              report = coverage(archive)
              yearly = period_rows(archive, 365)
              latest = yearly[:120]
              updated_at = NOW.strftime("%Y-%m-%d %H:%M KST")

              official_recent = [
                  row for row in period_rows(archive, 14)
                  if row.get("source") in {
                      "국토교통부", "서울특별시", "경기도"
                  }
              ]

              # 세 기관이 모두 실패하고 공식 자료도 하나도 없으면
              # 기존 데이터를 0건으로 덮어쓰지 않고 작업을 실패시킵니다.
              successful_sources = sum(
                  1 for message in source_status.values()
                  if "실패" not in message
              )
              if successful_sources == 0 and not official_recent:
                  raise RuntimeError(
                      "국토부·서울시·경기도 공식자료 수집이 모두 실패했습니다."
                  )

              if report["complete"]:
                  STATE_PATH.write_text(
                      json.dumps(
                          {
                              "complete": True,
                              "completed_at": NOW.isoformat(),
                              "coverage": report,
                          },
                          ensure_ascii=False,
                          indent=2,
                      ),
                      encoding="utf-8",
                  )

              ARCHIVE_PATH.write_text(
                  json.dumps(archive, ensure_ascii=False, indent=2),
                  encoding="utf-8",
              )
              LATEST_PATH.write_text(
                  json.dumps(
                      {
                          "updated_at": updated_at,
                          "counts": counts(archive, 365),
                          "period_counts": {
                              "weekly": counts(archive, 7),
                              "monthly": counts(archive, 30),
                              "yearly": counts(archive, 365),
                          },
                          "counts_period": "최근 1년",
                          "archive_size": len(yearly),
                          "coverage": report,
                          "source_status": source_status,
                          "backfill_errors": backfill_errors,
                          "items": latest,
                      },
                      ensure_ascii=False,
                      indent=2,
                  ),
                  encoding="utf-8",
              )
              KEYWORDS_PATH.write_text(
                  json.dumps(
                      {
                          "updated_at": updated_at,
                          "weekly": keyword_rows(archive, 7),
                          "monthly": keyword_rows(archive, 30),
                          "yearly": keyword_rows(archive, 365),
                      },
                      ensure_ascii=False,
                      indent=2,
                  ),
                  encoding="utf-8",
              )
              ISSUES_PATH.write_text(
                  json.dumps(
                      {
                          "updated_at": updated_at,
                          "coverage": report,
                          "weekly": issue_rows(archive, 7),
                          "monthly": issue_rows(archive, 30),
                          "yearly": issue_rows(archive, 365),
                      },
                      ensure_ascii=False,
                      indent=2,
                  ),
                  encoding="utf-8",
              )

              print("=== 공식자료 수집 상태 ===")
              for name, message in source_status.items():
                  print(f"{name}: {message}")
              print(
                  "RESULT "
                  f"items={report['items']} "
                  f"oldest={report['oldest']} "
                  f"newest={report['newest']} "
                  f"days={report['days_covered']} "
                  f"complete={report['complete']} "
                  f"official14d={len(official_recent)}"
              )

          if __name__ == "__main__":
              main()
          PY

          python /tmp/urbanplanningdaily_v5.py

      - name: 결과 저장
        shell: bash
        run: |
          git config user.name "urbanplanningdaily-bot"
          git config user.email "urbanplanningdaily-bot@users.noreply.github.com"
          git add data/
          if git diff --cached --quiet; then
            echo "새로운 변경사항이 없습니다."
          else
            git commit -m "자동수집: $(date -u +'%Y-%m-%d')"
            git push
          fi

      - name: 배포용 홈페이지 만들기
        shell: bash
        run: |
          mkdir -p _site/data
          cp index.html _site/
          touch _site/.nojekyll
          cp data/latest.json _site/data/
          cp data/keywords.json _site/data/
          cp data/issues.json _site/data/

      - name: GitHub Pages 설정
        uses: actions/configure-pages@v6

      - name: 홈페이지 파일 업로드
        uses: actions/upload-pages-artifact@v5
        with:
          path: _site

      - name: 홈페이지 배포
        id: deployment
        uses: actions/deploy-pages@v5
