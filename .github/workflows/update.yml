name: 국토부 보도자료 7일 수집 테스트

on:
  workflow_dispatch:

jobs:
  test-molit:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: 국토부 공식 보도자료 확인
        shell: bash
        run: |
          python3 -m pip install --quiet requests beautifulsoup4 feedparser

          python3 - <<'PY'
          from datetime import date, timedelta
          from urllib.parse import urljoin
          import re

          import feedparser
          import requests
          from bs4 import BeautifulSoup

          today = date.today()
          start = today - timedelta(days=7)

          headers = {
              "User-Agent": (
                  "Mozilla/5.0 (Windows NT 10.0; Win64; x64) "
                  "AppleWebKit/537.36 Chrome/149 Safari/537.36"
              )
          }

          list_url = "https://www.molit.go.kr/USR/NEWS/m_71/lst.jsp"
          params = {
              "lst_gbn": "T",
              "psize": "50",
              "search_gubun": "1",
              "search_regdate_s": start.isoformat(),
              "search_regdate_e": today.isoformat(),
              "srch_usr_titl": "Y",
              "lcmspage": "1",
          }

          print("=== 국토부 공식 목록 테스트 ===")
          response = requests.get(
              list_url,
              params=params,
              headers=headers,
              timeout=30,
          )
          print("상태:", response.status_code)
          print("주소:", response.url)
          print("형식:", response.headers.get("content-type"))
          print("크기:", len(response.content), "bytes")
          response.raise_for_status()

          response.encoding = response.apparent_encoding or "utf-8"
          soup = BeautifulSoup(response.text, "html.parser")

          found = []
          seen = set()

          for anchor in soup.select('a[href*="dtl.jsp?id="]'):
              title = " ".join(anchor.get_text(" ", strip=True).split())
              if len(title) < 4:
                  continue

              container = anchor.find_parent(["tr", "li", "div"])
              context = (
                  " ".join(container.get_text(" ", strip=True).split())
                  if container else title
              )
              match = re.search(
                  r"20\d{2}[./-]\s*\d{1,2}[./-]\s*\d{1,2}",
                  context,
              )
              published = match.group(0) if match else "날짜 미확인"
              link = urljoin(list_url, anchor.get("href", ""))

              key = (title, link)
              if key in seen:
                  continue
              seen.add(key)
              found.append((published, title, link))

          print("목록에서 찾은 보도자료:", len(found), "건")
          for published, title, link in found[:20]:
              print("-", published, "|", title)
              print(" ", link)

          print()
          print("=== 국토부 공식 RSS 테스트 ===")
          rss_url = (
              "https://www.molit.go.kr/dev/board/"
              "board_rss.jsp?rss_id=NEWS"
          )
          rss_response = requests.get(
              rss_url,
              headers=headers,
              timeout=30,
          )
          print("상태:", rss_response.status_code)
          print("형식:", rss_response.headers.get("content-type"))
          print("크기:", len(rss_response.content), "bytes")
          rss_response.raise_for_status()

          feed = feedparser.parse(rss_response.content)
          print("RSS 항목:", len(feed.entries), "건")
          for entry in feed.entries[:20]:
              print(
                  "-",
                  entry.get("published", entry.get("updated", "")),
                  "|",
                  entry.get("title", ""),
              )

          if not found and not feed.entries:
              print()
              print("진단용 HTML 앞부분:")
              print(response.text[:1000])
              raise SystemExit(
                  "실패: 공식 목록과 RSS 모두 0건입니다."
              )

          print()
          print("테스트 성공: 국토부 공식 자료를 확인했습니다.")
          PY
