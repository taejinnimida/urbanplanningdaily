name: 도시계획일보 자동수집

on:
  workflow_dispatch:

  schedule:
    - cron: "17 6 * * *"
      timezone: "Asia/Seoul"

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: urbanplanningdaily-pages
  cancel-in-progress: false

jobs:
  collect-and-deploy:
    runs-on: ubuntu-latest

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: 저장소 불러오기
        uses: actions/checkout@v4

      - name: 파이썬 설치
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: 필요 프로그램 설치
        run: pip install -r requirements.txt

      - name: 최신 자료 수집 및 키워드 분석
        run: python scripts/collect.py

      - name: 수집 결과 저장
        run: |
          git config user.name "urbanplanningdaily-bot"
          git config user.email "urbanplanningdaily-bot@users.noreply.github.com"
          git add data/

          if git diff --cached --quiet; then
            echo "새로운 변경사항이 없습니다."
          else
            git commit -m "자동수집: $(date +'%Y-%m-%d')"
            git push
          fi

      - name: 배포용 홈페이지 만들기
        run: |
          mkdir -p _site/data
          cp index.html _site/
          touch _site/.nojekyll
          cp data/latest.json _site/data/
          cp data/keywords.json _site/data/

      - name: GitHub Pages 설정
        uses: actions/configure-pages@v5

      - name: 홈페이지 파일 업로드
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: 홈페이지 배포
        id: deployment
        uses: actions/deploy-pages@v5
